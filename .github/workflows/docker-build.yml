name: docker-build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/fibegg/go-fibe-app
  CACHE_IMAGE: ghcr.io/fibegg/go-fibe-app-buildcache

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build dev image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ env.IMAGE }}:dev-pr-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev
      - name: Build production image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ env.IMAGE }}:prod-pr-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
      - name: Build and push dev image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:dev-main
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:dev
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:dev,mode=max
      - name: Build and push production image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:prod-main
            ${{ env.IMAGE }}:prod-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:prod
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:prod,mode=max
